# ============================================================================
# PortfolioCraft — Nginx Production Config
# Server layout:
#   App lives at : /home/quickrpe/portfolio
#   Main site    : portfolio.dotdevz.com
#   User slugs   : alice.portfolio.dotdevz.com  (wildcard *.portfolio.dotdevz.com)
#   Custom domain: alice.com          (catch-all + X-Custom-Domain header)
#
# Deploy:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/portfolio
#   sudo ln -s /etc/nginx/sites-available/portfolio \
#              /etc/nginx/sites-enabled/portfolio
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# ─── HTTP → HTTPS (all domains) ─────────────────────────────────────────────
server {
    listen 80;
    server_name portfolio.dotdevz.com www.portfolio.dotdevz.com;

    # Let's Encrypt HTTP-01 challenge (needed by certbot)
    location ~ ^/.well-known {
        root /home/quickrpe/portfolio;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name *.portfolio.dotdevz.com;
    return 301 https://$host$request_uri;
}

# ─── HTTPS — Main app (portfolio.dotdevz.com + www) ─────────────────────────
server {
    listen 443 ssl http2;
    server_name portfolio.dotdevz.com www.portfolio.dotdevz.com;

    ssl_certificate     /etc/letsencrypt/live/portfolio.dotdevz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio.dotdevz.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /home/quickrpe/portfolio/dist;
    index index.html;

    client_max_body_size 20M;

    location = /favicon.ico { access_log off; log_not_found off; }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Django REST API
    location /api/ {
        include proxy_params;
        proxy_pass http://unix:/home/quickrpe/portfolio/portfolio.sock;
        proxy_read_timeout 60s;
    }

    # Django built-in admin UI
    location /admin/ {
        include proxy_params;
        proxy_pass http://unix:/home/quickrpe/portfolio/portfolio.sock;
    }

    # Collected static & media
    location /static/ { alias /home/quickrpe/portfolio/backend/staticfiles/; }
    location /media/  { alias /home/quickrpe/portfolio/backend/media/; }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;
}

# ─── HTTPS — Wildcard user subdomains (*.portfolio.dotdevz.com) ──────────────
# Each registered user automatically gets alice.portfolio.dotdevz.com.
# Requires a wildcard TLS cert (DNS-01 challenge) — see setup-ssl.sh wildcard.
# DNS: add  A  *.portfolio.dotdevz.com → server IP
server {
    listen 443 ssl http2;
    server_name *.portfolio.dotdevz.com;

    # Same cert as main domain — expanded to cover *.portfolio.dotdevz.com
    ssl_certificate     /etc/letsencrypt/live/portfolio.dotdevz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio.dotdevz.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /home/quickrpe/portfolio/dist;
    index index.html;

    client_max_body_size 20M;

    # The frontend's detectSubdomain() reads $host and calls /api/portfolio/by-host/
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        include proxy_params;
        proxy_pass http://unix:/home/quickrpe/portfolio/portfolio.sock;
        proxy_read_timeout 60s;
    }

    location /static/ { alias /home/quickrpe/portfolio/backend/staticfiles/; }
    location /media/  { alias /home/quickrpe/portfolio/backend/media/; }
}

# ─── HTTPS — Custom domains catch-all (johndoe.com) ─────────────────────────
# Any domain not matched above lands here (user's own domain pointing to server).
# Nginx keeps Host = portfolio.dotdevz.com so Django ALLOWED_HOSTS always passes,
# and adds X-Custom-Domain so the Django view can look up the right profile.
#
# SSL: self-signed fallback until you run:
#   sudo bash deploy/setup-ssl.sh add-custom johndoe.com
# After that, add a dedicated server{} block per the printed instructions.
server {
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/self-signed.crt;
    ssl_certificate_key /etc/nginx/ssl/self-signed.key;

    root  /home/quickrpe/portfolio/dist;
    index index.html;

    client_max_body_size 20M;

    # Certbot webroot challenge for custom domain SSL certs
    location ~ ^/.well-known {
        root /home/quickrpe/portfolio;
        allow all;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Rewrite Host so Django's ALLOWED_HOSTS check passes
        proxy_pass         http://unix:/home/quickrpe/portfolio/portfolio.sock;
        proxy_set_header   Host              portfolio.dotdevz.com;
        proxy_set_header   X-Custom-Domain   $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /static/ { alias /home/quickrpe/portfolio/backend/staticfiles/; }
    location /media/  { alias /home/quickrpe/portfolio/backend/media/; }
}
